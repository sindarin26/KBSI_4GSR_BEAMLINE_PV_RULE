# Informal v0 registry contract.
# This is not yet a full JSON Schema or validation schema.

registry:
  required:
    beamline: string
    rulebook_version: string
    pvs: list
  pv_entry:
    required:
      rulebook_version: string
      source_trace: object
      prefix: string
      area: string
      device: string
      axis_or_function: string
      pv: string
      status: string
      notes: list
    source_trace:
      required:
        raw_id: string_or_null
        source_id: string
        source_line: integer_or_null
        source_anchor: string
        source_label: string_or_null
      conditional:
        if_raw_extracted_pvs_exists:
          raw_id: string
raw_extracted_pvs:
  required:
    beamline: string
    rulebook_version: string
    extracted_from: list
    entries: list
  extracted_from_entry:
    required:
      source_id: string
      source_type: string
      source_state: included_or_excluded
      pv_like_entries: integer_or_null
    optional:
      exclude_reason: string_or_null
      notes: string_or_null
    conditional:
      if_source_state_included:
        pv_like_entries: integer
      if_source_state_excluded:
        exclude_reason: non_empty_string
  entry:
    required:
      raw_id: string
      status: extracted_or_skipped
      source_trace: object
    optional:
      raw_pv: string_or_null
      raw_device: string_or_null
      raw_axis_or_function: string_or_null
      skip_reason: non_empty_string_when_status_skipped
      raw_group: string_or_null
      raw_metadata: object
    conditional:
      if_raw_pv_missing_or_null:
        require_one_of:
          - raw_device
          - raw_axis_or_function
          - raw_metadata
      if_status_skipped:
        skip_reason: non_empty_string
    raw_id_format: RAW-[0-9]{4}
    status_values:
      - extracted
      - skipped
    source_trace:
      required:
        source_id: string
        source_line: integer_or_null
        source_anchor: string
        source_label: string_or_null
    optional_metadata:
      egu: string_or_null
      init: number_string_or_null
      low: number_string_or_null
      high: number_string_or_null
      velocity: number_string_or_null
      ioc: string_or_null
      source: string_or_null
