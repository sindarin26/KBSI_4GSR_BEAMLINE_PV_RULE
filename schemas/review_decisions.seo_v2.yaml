# Informal SEO_v2 review decision row contract.
# Review decision files are JSON arrays written by scripts/review_server.js.
# Row shape: see schemas/pv_review_row.seo_v2.yaml (shared contract).
# Row validation: scripts/lib/pv_workbench.js validatePvRow().

review_decisions:
  beamline_decisions:
    path: reviews/<beamline>/review_decisions.json
  beamline_accepted_decisions:
    path: reviews/<beamline>/accepted_decisions.json
  beamline_fixed_decisions:
    path: reviews/<beamline>/fixed_decisions.json
  seo_v2_seed_decisions:
    path: fixtures/SEO_v2/review_decisions.json
    read_only: true
  row:
    ref: schemas/pv_review_row.seo_v2.yaml pv_review_row
    additional_optional:
      source: string
