# SEO_v2 review queue schema.
# review_queue.json is produced by scripts/build_review_queue.js and read by
# scripts/review_server.js (Phase 3) as the primary queue source.
# Row shape: see schemas/pv_review_row.seo_v2.yaml (shared contract).
# Row validation: scripts/validate_review_queue.js + scripts/lib/pv_workbench.js validatePvRow().

review_queue:
  paths:
    queue: outputs/<beamline>/_work/review_queue.json
    source_lists: outputs/<beamline>/_work/source_lists/<source-basename>.rows.json
  row:
    ref: schemas/pv_review_row.seo_v2.yaml pv_review_row
  constraints:
    no_seed_rows: dataset must equal the beamline identifier (e.g. ID10), not SEO_v2
    unique_raw_id: each rawId must appear exactly once
    unique_source_anchor: each (sourceId, sourceAnchor) pair must appear exactly once
    source_id_resolves: sourceId must point to an existing file under inputs/<beamline>/
  extractor_policy:
    json: deterministic
    xml: deterministic
    markdown_tables: deterministic
    free_text_txt: agent_extraction_cached_in_raw_extracted_pvs
    mixed_markdown: deterministic for table rows; agent for non-table rows
  source_label_values:
    - deterministic_json
    - deterministic_xml
    - deterministic_md_table
    - agent_extraction
  build_script: scripts/build_review_queue.js <beamline>
  validate_script: scripts/validate_review_queue.js <beamline>
