# Informal SEO_V3 database-pool contract.
# This is a documentation schema for the reviewed database_pool pilot workflow.

database_pool:
  path: database_pool/<pool_id>/
  required:
    manifest: manifest.yaml
    sources: sources/*.rows.json
    decisions: decisions/*.decisions.json
    abbreviations: database_pool/abbreviations/registry.json
  status: promoted_pilot
  policy:
    source_rows_are: source_facts_or_reviewable_candidates
    decision_rows_are: human_review_overlays
    active_policy_requires: explicit_promotion_to_rules_schemas_or_examples

manifest:
  required:
    pool_id: string
    title: string
    status: string
    schema_version: string
  optional:
    source_note: string
  status_values:
    - pilot
    - active
    - archived

source_rows_file:
  required:
    poolId: string
    sourceId: string
    rows: list
  row:
    required:
      uid: string
      rowId: string
      poolId: string
      sourceId: string
      sourceAnchor: string
      section: string
      port: string
      area: string
      device: string
      subdevice: string
      signal: string
      standardPv: string
      reviewStatus: string
      sourceTrace: object
    optional:
      sourcePv: string
      legacyRawId: string
      note: string
      metadata: object
    conditional_required:
      agent_input_conversion:
        when: sourceTrace.sourceKind == agent_input_conversion
        fields:
          note: non_empty string
        rule: agent-mediated rows must expose reviewer-facing source context,
          mapping assumptions, uncertainty, and vocabulary gaps in top-level
          note; metadata-only notes are insufficient
      standard_pv_evidence_v1:
        when: metadata.noteContract == standard_pv_evidence_v1
        fields:
          note: labeled evidence sections
        required_note_sections:
          - "Source:"
          - "HTML candidate:"
          - "Chosen PV:"
          - "Component changes:"
          - "Mapping evidence:"
          - "Uncertainty/Review required:"
          - "Vocabulary:"
        rule: regenerated semantic imports must make the evidence used to render
          standardPv visible in top-level note, not only in metadata
    disallowed:
      reviewNote: source rows must not carry reviewNote; human review comments
        belong in decision overlays
    identity:
      uid: deterministic SHA1 prefix over poolId + sourceId + sourceAnchor
      rowId: should equal standardPv for current SEO_V3 rows
    seo_v3_components:
      section_regex: "[A-Z]+"
      port_regex: "[0-9]{2}[A-Z]"
      area_regex: "[A-Z0-9]+"
      device_regex: "[A-Z0-9]+"
      subdevice_regex: "[A-Z0-9]+"
      signal_regex: "[A-Z][A-Za-z0-9]*"
      standardPv_format: section + port + "-" + area + ":" + device + "-" + subdevice + ":" + signal
      standardPv_regex: "[A-Z]+[0-9]{2}[A-Z]-[A-Z0-9]+:[A-Z0-9]+-[A-Z0-9]+:[A-Z][A-Za-z0-9]*"
    review_status_values:
      - draft
      - needs_input
      - accepted
      - approved
      - rejected
      - deprecated
      - exception
      - proposal
      - skipped
      - orphan
    non_durable_buckets:
      - pending
      - conflict
    non_durable_notes:
      candidate: abbreviation/code status only
      fixed: approved-row metadata only, not reviewStatus
    sourceTrace:
      required:
        sourceId: string
        sourceAnchor: string
        sourceLine: integer
        sourceKind: string
        sourceLabel: string
      optional:
        legacyRawId: string
      rule: sourceTrace.sourceId and sourceTrace.sourceAnchor must match row sourceId and sourceAnchor
    metadata:
      optional:
        noteContract: string
        componentEvidence: object
      note_contract_values:
        - standard_pv_evidence_v1
      componentEvidence:
        status: required_for_standard_pv_evidence_v1
        fields:
          - section
          - port
          - area
          - device
          - subdevice
        field_contract:
          exactCodeCandidates: non_empty_list
          candidate:
            code: must_match_rendered_row_component
            sourceTerms: non_empty_list_or_explicit_code_only_rationale
            resolutionKeyCandidates: non_empty_list
            sourceAnchor: required
            patternCandidates: optional_list
        pattern_candidate_rule:
          applies_to: numbered subdevice instance codes
          pattern_syntax: codePattern is not regex; # matches one ASCII digit;
            matching is full-string only

decision_rows_file:
  required:
    poolId: string
    decisions: list
  decision:
    required:
      uid: string
      reviewStatus: string
    optional:
      standardPv: string
      reviewNote: string
      updatedAt: iso_datetime
      locked: boolean
      useAsExample: boolean
      exampleRole: string
    rule: decision uid overlays a source row uid; missing source rows merge as orphan
    review_note_rule: reviewNote is a human/workbench decision-overlay field,
      not an agent source-row field

abbreviation_registry:
  path: database_pool/abbreviations/registry.json
  status: source_of_truth
  required:
    entries: list
  entry:
    required:
      kind: string
      meaning: string
      status: string
      scope: string
      source: object
      rationale: string
      usageEvidence: object
    exact_entry:
      required:
        code: string
      disallowed:
        codePattern: exact entries must not also define a pattern
    pattern_entry:
      status: pilot_contract_for_computed_issue_engine
      required:
        codePattern: string
        baseCode: string
      disallowed:
        code: pattern entries must not also define an exact code
      rule: codePattern is not regex; # matches one ASCII digit; matching is
        full-string only; baseCode must equal the literal prefix before the
        first #
    source:
      required:
        sourceId: string
        sourceAnchor: string
        sourceLabel: string
      rule: sourceId must not point at temp/
    usageEvidence:
      required:
        sourceList: list
        rowUsage: object
      rowUsage:
        required:
          currentCount: integer
          examples: list
    kind_values:
      - section
      - port
      - area
      - device
      - subdevice
    status_values:
      - candidate
      - approved
      - deprecated
      - rejected
    first_scope: global
    initial_status_policy:
      section.BL: approved
      future_sections: candidate
      markdown_ports: approved
      markdown_areas: approved
      markdown_devices: candidate
      markdown_subdevices: candidate
      html_db_only_codes: candidate
  derived_issue_contract:
    status: proposed_pilot_computed_only
    proposal: proposals/rule_changes/PROP-0002-abbreviation-issue-resolution-contract.md
    durable_storage: computed_only
    policy_scope: not active naming policy unless explicitly owner-promoted
    abbreviation_issue_kinds:
      - section
      - port
      - area
      - device
      - subdevice
    signal_policy: separate_issue_class
    exact_resolution_key: abbreviation:<scope>:<kind>:<code>
    meaning_resolution_key: abbreviation:<scope>:<kind>:<code>:<normalizedSourceTerm>
    pattern_resolution_key: abbreviation-pattern:<scope>:<kind>:<codePattern>:<normalizedMeaning>
    conflict_resolution_key: abbreviation-conflict:<scope>:<kind>:<code>
    missing_component_key: abbreviation-missing-component:<poolId>:<uid>:<field>
    issue_shape:
      required:
        - issueType
        - field
        - kind
        - code
        - status
        - blocking
        - resolutionKey
      optional:
        - sourceTerm
        - sourceAnchor
        - candidateMeanings
        - matchedPattern
        - resolutionMode
    resolution_modes:
      - exact
      - meaning
      - pattern
      - conflict
      - missing_component
    blocking_statuses:
      - missing_component
      - missing_registry_entry
      - candidate
      - deprecated
      - rejected
      - meaning_conflict
    rule: approving a matching registry entry resolves derived issues on
      recomputation; approving a row does not silently promote its component
      abbreviations

workbench:
  entrypoint: scripts/review_server.js --database-pool <pool_id> --port 8212
  wrapper: ./run_database_pool_workbench.sh [pool_id ...]
  validation: node --check scripts/review_server.js
  aggregate_validation: node scripts/validate_database_pool.js
  manual_smoke: scripts/review_server.js --database-pool <pool_id> --port 8212
  tabs:
    - All Rows
    - Review Queue
    - Needs Input
    - Accepted/Approved
  filters:
    - dataset
    - reviewStatus
    - port
    - area
    - dev
    - search
  save_targets:
    row_decisions: database_pool/<pool_id>/decisions/workbench.decisions.json
  read_only_inputs:
    abbreviation_registry: database_pool/abbreviations/registry.json
  behavior:
    source_rows: read_only
    abbreviation_registry: read_only
    explicit_pools_only: true
    wrapper_auto_discovers_pools: true
    pending: computed_only
    conflict: computed_only
  deferred_ui:
    - conflicts_tab
    - abbreviations_tab
    - bulk_approval
    - richer_component_filters
