# Shared SEO_v2 review row contract.
# Referenced by schemas/review_decisions.seo_v2.yaml and
# schemas/review_queue.seo_v2.yaml (Phase 2).
# Enforced by scripts/lib/pv_workbench.js validatePvRow().

pv_review_row:
  required:
    seq: number
    rawId: string
    dataset: string
    reviewStatus: string
    section: string
    standardPv: string
    note: string
  optional:
    port: string
    area: string
    dev: string
    subdev: string
    signal: string
    source: string
    sourceId: string
    sourceLine: number_or_null
    sourceAnchor: string
    sourceLabel: string_or_null
    reviewNote: string
    exceptionIds: list
    orphan: boolean
    legacyStandardPv: string
    egu: string
    ioc: string
    updatedAt: iso_datetime
  field_constraints:
    section: BL
    port_regex: "[0-9]{2}[A-Z]"
    area_values: see schemas/pv_registry.seo_v2.yaml registry.pv_entry.field_constraints.area_values
    device_values: see schemas/pv_registry.seo_v2.yaml registry.pv_entry.field_constraints.device_values
    subdevice_values: see schemas/pv_registry.seo_v2.yaml registry.pv_entry.field_constraints.subdevice_values
    signal_regex: "[A-Z][A-Za-z0-9]*"
    pv_format: section + "-" + port + ":" + area + "-" + dev + "-" + subdev + ":" + signal
    pv_regex: "BL-[0-9]{2}[A-Z]:[A-Z0-9]+-[A-Z0-9]+-[A-Z0-9]+:[A-Z][A-Za-z0-9]*"
  review_status_values:
    - needs_input
    - accepted
    - approved
    - edited
    - exception
    - skipped
    - proposal
    - fixed
  complete_statuses:
    - accepted
    - approved
    - edited
    - fixed
  complete_status_note: rows with a complete status must have non-empty port/area/dev/subdev/signal and a valid standardPv reconstruction
  rawId_formats:
    - RAW-[0-9]{4}
    - SEO-[0-9]{5}
  dataset_rule:
    beamline_rows: use the requested beamline id, for example ID10
    comparison_fixture_rows: SEO_v2
  orphan_note: orphan=true marks a saved decision whose rawId no longer appears in raw_extracted_pvs.yaml; PV shape checks are skipped for orphan rows
